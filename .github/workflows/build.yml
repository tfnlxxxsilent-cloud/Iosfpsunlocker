name: Build Geode Mod (iOS)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Geode mod for iOS
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ios
